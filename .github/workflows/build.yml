# Build + test; on push to main, publish dist/ to gh-pages (what GitHub Pages serves for this repo).
# Pushing to main alone does not update the live site until gh-pages is updated — see GITHUB_PAGES_SETUP.md

name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run test:run

      - name: Build production bundle
        run: npm run build
        env:
          VITE_BUILD: 'true'
          # Required for harvest form + edge calls on the deployed site (same values as local .env.production).
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_HARVEST_INTEREST_WEBHOOK_URL: ${{ secrets.VITE_HARVEST_INTEREST_WEBHOOK_URL }}

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist
          if-no-files-found: error

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          force_orphan: true
